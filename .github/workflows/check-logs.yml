name: Check Lambda Logs

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Fetch recent Lambda logs
        run: |
          aws logs tail /aws/lambda/tidy-quote-api --since 1h --format short 2>&1 | tail -100
