name: Deploy

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  FRONTEND_STACK_NAME: quotesnap-amplify
  BACKEND_STACK_NAME: quotesnap-backend
  RELEASES_BUCKET: francescobarbera-releases
  LAMBDA_CODE_KEY: quotesnap/lambda.zip

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend:
    name: Build Backend Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build Lambda binary
        working-directory: backend
        run: cargo build --release --target x86_64-unknown-linux-musl --bin quotesnap-backend
        env:
          JWT_SECRET: build-placeholder

      - name: Package Lambda
        run: |
          cp backend/target/x86_64-unknown-linux-musl/release/quotesnap-backend bootstrap
          zip lambda.zip bootstrap
          rm bootstrap

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda.zip
          retention-days: 1

  deploy-infra:
    name: Deploy Infrastructure
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    outputs:
      amplify-app-id: ${{ steps.get-outputs.outputs.amplify-app-id }}
      api-url: ${{ steps.get-outputs.outputs.api-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Upload Lambda code to S3
        run: aws s3 cp lambda.zip "s3://${{ env.RELEASES_BUCKET }}/${{ env.LAMBDA_CODE_KEY }}"

      - name: Deploy frontend infrastructure
        run: |
          aws cloudformation deploy \
            --stack-name ${{ env.FRONTEND_STACK_NAME }} \
            --template-file infra/cloudformation/amplify.yaml \
            --parameter-overrides \
              BasicAuthUsername="${{ secrets.BASIC_AUTH_USERNAME }}" \
              BasicAuthPassword="${{ secrets.BASIC_AUTH_PASSWORD }}" \
            --no-fail-on-empty-changeset

      - name: Clean up stuck backend stack
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STACK_STATUS" = "REVIEW_IN_PROGRESS" ] || [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack in $STACK_STATUS state, deleting..."
            aws cloudformation delete-stack --stack-name ${{ env.BACKEND_STACK_NAME }}
            aws cloudformation wait stack-delete-complete --stack-name ${{ env.BACKEND_STACK_NAME }}
            echo "Stuck stack deleted"
          else
            echo "Stack status: $STACK_STATUS (no cleanup needed)"
          fi

      - name: Deploy backend infrastructure
        run: |
          CHANGESET_NAME="deploy-$(date +%s)"

          # Create changeset manually for better error diagnostics
          aws cloudformation create-change-set \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --change-set-name "$CHANGESET_NAME" \
            --change-set-type CREATE \
            --template-body file://infra/cloudformation/backend.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=MongoDbUri,ParameterValue="${{ secrets.MONGODB_URI }}" \
              ParameterKey=MongoDbDatabase,ParameterValue="${{ secrets.MONGODB_DATABASE }}" \
              ParameterKey=AiBaseUrl,ParameterValue="${{ secrets.AI_BASE_URL }}" \
              ParameterKey=AiApiKey,ParameterValue="${{ secrets.AI_API_KEY }}" \
              ParameterKey=AiModel,ParameterValue="${{ secrets.AI_MODEL }}" \
              ParameterKey=JwtSecret,ParameterValue="${{ secrets.JWT_SECRET }}" \
              ParameterKey=LambdaCodeBucket,ParameterValue="${{ env.RELEASES_BUCKET }}" \
              ParameterKey=LambdaCodeKey,ParameterValue="${{ env.LAMBDA_CODE_KEY }}"

          echo "Waiting for changeset..."
          aws cloudformation wait change-set-create-complete \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --change-set-name "$CHANGESET_NAME" 2>&1 || true

          echo "=== Changeset Status ==="
          aws cloudformation describe-change-set \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --change-set-name "$CHANGESET_NAME" \
            --output json

          echo "=== Stack Events ==="
          aws cloudformation describe-stack-events \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --output json --query 'StackEvents[0:5]'

          # Execute if changeset succeeded
          CS_STATUS=$(aws cloudformation describe-change-set \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --change-set-name "$CHANGESET_NAME" \
            --query 'Status' --output text)

          if [ "$CS_STATUS" = "CREATE_COMPLETE" ]; then
            aws cloudformation execute-change-set \
              --stack-name ${{ env.BACKEND_STACK_NAME }} \
              --change-set-name "$CHANGESET_NAME"
            aws cloudformation wait stack-create-complete \
              --stack-name ${{ env.BACKEND_STACK_NAME }}
          else
            echo "Changeset failed with status: $CS_STATUS"
            exit 1
          fi

      - name: Get stack outputs
        id: get-outputs
        run: |
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.FRONTEND_STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`AppId`].OutputValue' \
            --output text)
          echo "amplify-app-id=$APP_ID" >> "$GITHUB_OUTPUT"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api-url=$API_URL" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend Lambda
    needs: [deploy-infra]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda code
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.BACKEND_STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`LambdaFunctionName`].OutputValue' \
            --output text)

          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "${{ env.RELEASES_BUCKET }}" \
            --s3-key "${{ env.LAMBDA_CODE_KEY }}"

          echo "Waiting for function update..."
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          echo "Lambda deployed successfully"

  deploy-frontend:
    name: Deploy Frontend Site
    needs: [build-frontend, deploy-infra]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Amplify
        run: |
          APP_ID="${{ needs.deploy-infra.outputs.amplify-app-id }}"
          BRANCH_NAME="main"

          # Stop any in-progress deployments
          PENDING_JOBS=$(aws amplify list-jobs \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --query "jobSummaries[?status=='PENDING' || status=='RUNNING'].jobId" \
            --output text)

          for JOB in $PENDING_JOBS; do
            echo "Stopping in-progress job: $JOB"
            aws amplify stop-job --app-id "$APP_ID" --branch-name "$BRANCH_NAME" --job-id "$JOB" || true
          done

          cd dist
          zip -r ../deploy.zip .
          cd ..

          DEPLOYMENT_RESULT=$(aws amplify create-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH_NAME")

          UPLOAD_URL=$(echo "$DEPLOYMENT_RESULT" | jq -r '.zipUploadUrl')
          JOB_ID=$(echo "$DEPLOYMENT_RESULT" | jq -r '.jobId')

          echo "Uploading to Amplify..."
          curl --fail -T deploy.zip "$UPLOAD_URL"

          echo "Starting deployment (Job ID: $JOB_ID)..."
          aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-id "$JOB_ID"

          echo "Frontend deployed successfully"
