<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="handle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#e88a18"/>
    </linearGradient>
    <linearGradient id="bristle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4ddbb5"/>
      <stop offset="50%" stop-color="#2cc0dc"/>
      <stop offset="100%" stop-color="#1a6fa0"/>
    </linearGradient>
    <linearGradient id="band" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3ddbb0"/>
      <stop offset="100%" stop-color="#1a9e8f"/>
    </linearGradient>
  </defs>

  <g transform="translate(256,260) rotate(-20) translate(-256,-260)">

    <!-- Handle stick -->
    <rect x="244" y="155" width="24" height="150" rx="6" fill="url(#handle)"/>

    <!-- Dollar sign "$" as a single path -->
    <!-- Vertical bar -->
    <rect x="250" y="28" width="12" height="132" rx="6" fill="url(#handle)"/>
    <!-- S curve: top half curves right, bottom half curves left -->
    <path d="M 280 58 C 260 38, 226 44, 226 66 C 226 88, 260 92, 280 96 C 300 100, 290 132, 264 136 C 244 138, 228 128, 228 128" stroke="url(#handle)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Broom head band -->
    <rect x="214" y="298" width="84" height="44" rx="10" fill="url(#band)"/>
    <rect x="222" y="312" width="68" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="222" y="324" width="68" height="4" rx="2" fill="#ffffff" opacity="0.3"/>

    <!-- Bristles -->
    <path d="M224 342 C216 390, 185 435, 148 478" stroke="url(#bristle)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M240 342 C236 395, 216 442, 192 480" stroke="url(#bristle)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M256 342 C256 400, 250 448, 240 482" stroke="url(#bristle)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M272 342 C276 400, 284 446, 292 482" stroke="url(#bristle)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M288 342 C298 395, 322 440, 348 476" stroke="url(#bristle)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M298 342 C314 388, 350 432, 384 464" stroke="url(#bristle)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
</svg>
