AWSTemplateFormatVersion: '2010-09-09'
Description: Tidy-Quote Backend - API Gateway + Lambda

Parameters:
  MongoDbUri:
    Type: String
    NoEcho: true
    Description: MongoDB connection URI

  MongoDbDatabase:
    Type: String
    Default: tidy-quote
    Description: MongoDB database name

  AiBaseUrl:
    Type: String
    Default: 'https://openrouter.ai/api/v1'
    Description: AI provider base URL

  AiApiKey:
    Type: String
    NoEcho: true
    Description: AI provider API key

  AiModel:
    Type: String
    Default: google/gemini-3-flash-preview
    Description: AI model identifier

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda code

  LambdaCodeKey:
    Type: String
    Description: S3 key for Lambda zip package

  SesSender:
    Type: String
    Default: noreply@tidyquote.app
    Description: SES sender email address

  AppBaseUrl:
    Type: String
    Default: 'https://app.tidyquote.app'
    Description: Frontend app base URL (used for email links)

Resources:
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: tidy-quote-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: lambda-basic-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ses:SendEmail'
                  - 'ses:SendRawEmail'
                Resource:
                  - !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/tidyquote.app'

  LambdaFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: tidy-quote-api
      Runtime: provided.al2023
      Handler: bootstrap
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DATABASE: !Ref MongoDbDatabase
          AI_BASE_URL: !Ref AiBaseUrl
          AI_API_KEY: !Ref AiApiKey
          AI_MODEL: !Ref AiModel
          JWT_SECRET: !Ref JwtSecret
          SES_SENDER: !Ref SesSender
          APP_BASE_URL: !Ref AppBaseUrl
      Architectures:
        - x86_64

  HttpApi:
    Type: 'AWS::ApiGatewayV2::Api'
    Properties:
      Name: tidy-quote-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - 'https://app.tidyquote.app'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'
        MaxAge: 3600

  HttpApiIntegration:
    Type: 'AWS::ApiGatewayV2::Integration'
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  HttpApiRoute:
    Type: 'AWS::ApiGatewayV2::Route'
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: 'AWS::ApiGatewayV2::Stage'
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: api.tidyquote.app
      ValidationMethod: DNS

  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: api.tidyquote.app
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCertificate
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn: HttpApiStage
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomainName
      Stage: '$default'

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: tidy-quote-alarms

  AlarmTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: info@tidyquote.app

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: tidy-quote-lambda-errors
      AlarmDescription: Lambda function errors exceed threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: tidy-quote-lambda-duration
      AlarmDescription: Lambda p99 duration approaching timeout
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: tidy-quote-api-5xx
      AlarmDescription: API 5xx responses exceed threshold
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  LambdaApiGatewayPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub '${AWS::StackName}-FunctionName'

  ApiUrl:
    Description: API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  LambdaArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn

  ApiCustomDomainTarget:
    Description: CNAME target for api.tidyquote.app in Cloudflare DNS
    Value: !GetAtt ApiDomainName.RegionalDomainName
