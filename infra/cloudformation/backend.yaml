AWSTemplateFormatVersion: '2010-09-09'
Description: TidyQuote Backend - API Gateway + Lambda

Parameters:
  MongoDbUri:
    Type: String
    NoEcho: true
    Description: MongoDB connection URI

  MongoDbDatabase:
    Type: String
    Default: tidyquote
    Description: MongoDB database name

  AiBaseUrl:
    Type: String
    Default: 'https://openrouter.ai/api/v1'
    Description: AI provider base URL

  AiApiKey:
    Type: String
    NoEcho: true
    Description: AI provider API key

  AiModel:
    Type: String
    Default: google/gemini-3-flash-preview
    Description: AI model identifier

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda code

  LambdaCodeKey:
    Type: String
    Description: S3 key for Lambda zip package

Resources:
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: tidyquote-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: lambda-basic-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'

  LambdaFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: tidyquote-api
      Runtime: provided.al2023
      Handler: bootstrap
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DATABASE: !Ref MongoDbDatabase
          AI_BASE_URL: !Ref AiBaseUrl
          AI_API_KEY: !Ref AiApiKey
          AI_MODEL: !Ref AiModel
          JWT_SECRET: !Ref JwtSecret
      Architectures:
        - x86_64

  HttpApi:
    Type: 'AWS::ApiGatewayV2::Api'
    Properties:
      Name: tidyquote-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'
        MaxAge: 3600

  HttpApiIntegration:
    Type: 'AWS::ApiGatewayV2::Integration'
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  HttpApiRoute:
    Type: 'AWS::ApiGatewayV2::Route'
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: 'AWS::ApiGatewayV2::Stage'
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  LambdaApiGatewayPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

Outputs:
  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub '${AWS::StackName}-FunctionName'

  ApiUrl:
    Description: API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  LambdaArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
